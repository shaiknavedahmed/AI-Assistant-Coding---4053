<!--Task 3 -Develop a dynamic shopping cart system.
Requirements:
• Add, remove, and update product quantities.
• Display real-time total price.
• Use AI to:
o Manage cart state using JavaScript objects.
o Persist cart data in localStorage.-->
<!-- <!DOCTYPE html>
<html>
<head>
<title>Cart</title>
</head>
<body>

<h2>Products</h2>
<button onclick="addItem('Laptop', 50000)">Add Laptop</button>
<button onclick="addItem('Phone', 20000)">Add Phone</button>

<h2>Cart</h2>
<ul id="cart"></ul>
<h3>Total: ₹<span id="total">0</span></h3>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || {};

function addItem(name, price) {
  if (!cart[name]) cart[name] = {price, qty: 0};
  cart[name].qty++;
  updateCart();
}

function removeItem(name) {
  delete cart[name];
  updateCart();
}

function updateCart() {
  localStorage.setItem("cart", JSON.stringify(cart));
  let list = document.getElementById("cart");
  list.innerHTML = "";
  let total = 0;

  for (let item in cart) {
    let li = document.createElement("li");
    let p = cart[item].price * cart[item].qty;
    total += p;

    li.innerHTML = `${item} x ${cart[item].qty} = ₹${p}
    <button onclick="removeItem('${item}')">Remove</button>`;
    list.appendChild(li);
  }

  document.getElementById("total").innerText = total;
}

updateCart();
</script>

</body>
</html> -->

  }

<!--Task 6 – Online Examination System
Create an online exam interface.
Requirements:
• Timer, questions, and submission.
• Prevent multiple submissions.
• Use AI to:
o Manage exam state.
o Improve exam UX.
o Ensure accessibility.-->
<!DOCTYPE html>
<html>
<body>

<h2 id="timer">Time: 30</h2>

<form id="quiz">
  <p>1. Capital of India?</p>
  <input type="radio" name="q1" value="Delhi"> Delhi<br>
  <input type="radio" name="q1" value="Mumbai"> Mumbai<br>
</form>

<button onclick="submitExam()">Submit</button>

<script>
let time = 30;
let submitted = false;

let timer = setInterval(() => {
  if (time <= 0) {
    clearInterval(timer);
    submitExam();
  }
  document.getElementById("timer").innerText = "Time: " + time--;
}, 1000);

function submitExam() {
  if (submitted) return;
  submitted = true;

  let answer = document.querySelector('input[name="q1"]:checked');
  alert(answer && answer.value === "Delhi" ? "Correct" : "Wrong");
}
</script>

</body>
</html>
